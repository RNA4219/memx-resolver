algorithm:
  name: weighted_sum
  score_formula: "(impact * 0.40) + (urgency * 0.30) + (risk * 0.20) + (recovery_cost * 0.10)"
  dimensions:
    impact:
      weight: 0.40
      scale: [1, 5]
    urgency:
      weight: 0.30
      scale: [1, 5]
    risk:
      weight: 0.20
      scale: [1, 5]
    recovery_cost:
      weight: 0.10
      scale: [1, 5]
