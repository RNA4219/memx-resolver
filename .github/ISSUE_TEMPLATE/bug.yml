name: Bug Report
description: 不具合報告テンプレート
title: "[Bug] "
labels:
  - bug
body:
  - type: input
    id: related_intent
    attributes:
      label: 関連 Intent ID
      description: "例: IN-20250303-001"
      placeholder: IN-YYYYMMDD-XXX
    validations:
      required: true

  - type: textarea
    id: reproduction_steps
    attributes:
      label: 再現手順
      description: 再現可能な最小手順を箇条書きで記載してください。
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected_vs_actual
    attributes:
      label: 期待値/実際値
      description: 期待される挙動と実際の挙動を両方記載してください。
      placeholder: |
        期待値:
        - ...

        実際値:
        - ...
    validations:
      required: true

  - type: textarea
    id: impact_scope
    attributes:
      label: 影響範囲
      description: 影響する機能、ユーザー範囲、業務影響を記載してください。
      placeholder: |
        - 機能:
        - ユーザー範囲:
        - 業務影響:
    validations:
      required: true
