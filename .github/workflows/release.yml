name: Release v1.1.0

on:
  push:
    tags:
      - v1.1.0
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to package (must be v1.1.0)
        required: true
        default: v1.1.0

permissions:
  contents: read

env:
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}
      - name: Verify tag and clean build
        run: |
          test "${RELEASE_TAG}" = "v1.1.0"
          test -z "$(git status --porcelain)"

  python-dist:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - run: python -m pip install --upgrade build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*
          if-no-files-found: error

  go-binaries:
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          cache-dependency-path: go.sum
      - name: Build mem
        shell: bash
        working-directory: .
        run: |
          suffix=''
          if [ '${{ matrix.goos }}' = windows ]; then suffix='.exe'; fi
          mkdir -p "$GITHUB_WORKSPACE/release-assets"
          CGO_ENABLED=0 GOOS='${{ matrix.goos }}' GOARCH='${{ matrix.goarch }}' go build -trimpath -ldflags='-s -w' -o "$GITHUB_WORKSPACE/release-assets/mem-${{ matrix.goos }}-${{ matrix.goarch }}${suffix}" ./cmd/mem
      - uses: actions/upload-artifact@v4
        with:
          name: mem-${{ matrix.goos }}-${{ matrix.goarch }}
          path: release-assets/*
          if-no-files-found: error

  github-release:
    needs: [python-dist, go-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag || github.ref }}
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - name: Generate checksums
        working-directory: release-assets
        run: sha256sum * > SHA256SUMS
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$RELEASE_TAG" release-assets/* --verify-tag --generate-notes --title "$RELEASE_TAG"
