name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go-test:
    name: Go Tests (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: docs/memx_spec_v3/go
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          cache-dependency-path: docs/memx_spec_v3/go/go.sum

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -v -timeout 5m

      - name: Race test
        if: runner.os == 'Linux'
        run: go test -race ./... -count=1 -timeout 5m

  python-test:
    name: Python ${{ matrix.python-version }} (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.11', '3.12', '3.13']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build distributions
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Install wheel and test dependencies
        shell: bash
        run: python -m pip install "$(find dist -name '*.whl' -print -quit)[test]"

      - name: Test
        run: python -m pytest tests/ -v --tb=short
